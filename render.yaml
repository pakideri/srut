services:
  - type: web
    name: srut-ats
    env: docker
    plan: free          # upgrade to starter for the persistent disk below
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/ats.db

    # Keeps SQLite data across redeploys — requires Starter plan ($7/mo).
    # Remove this block if you are on the free plan (data resets on each deploy).
    disk:
      name: srut-data
      mountPath: /data
      sizeGB: 1
